<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sierpiński Visual</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<aside class="sidebar">
  <h1>Triángulo de Sierpiński</h1>
  <p class="subtitle">Simulación de Sistemas 1 <br> Huerta Terán Mauricio Andrés</p>

  <div class="stats">
    <svg id="dice-svg" viewBox="0 0 72 72">
      <rect class="die-face" x="2" y="2" width="68" height="68" rx="12"/>
      <g id="dots"></g>
    </svg>

    <div>
      <div class="subtitle">iteraciones</div>
      <div class="stat-value" id="iter-count">0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btn-start">Iniciar</button>
    <button class="btn" id="btn-pause" disabled>Pausar</button>
    <button class="btn" id="btn-reset">Reiniciar</button>

    <div class="speed-wrap">
      <label>velocidad</label>
      <input type="range" id="speed" min="1" max="5" value="3">
    </div>
  </div>

</aside>

<main class="main">
  <canvas id="c" width="560" height="500"></canvas>
</main>

</div>

<footer>Triángulo de Sierpiński · Juego del caos</footer>

<script src="scriptTriangulo.js"></script>
</body>
</html>
